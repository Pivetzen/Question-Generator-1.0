<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Questões Dinâmico com IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> Gerador de Questões IA</h1>
        <p>Selecione o conteúdo temático e o nível desejado para praticar</p>
        <button class="config-btn" onclick="toggleConfig()" title="Configurar API Key">
            <i class="fa-solid fa-gear"></i>
        </button>
    </header>

    <div id="panel-config" class="card config-panel">
        <div class="form-group">
            <label for="input-key"><i class="fa-solid fa-key"></i> Gemini API Key (Gratuita)</label>
            <input type="password" id="input-key" placeholder="Cole sua AI Studio Key aqui">
            <p class="config-help">
                Pegue sua chave de graça no site do <b>Google AI Studio</b>. Ela fica salva apenas no seu navegador.
            </p>
            <button class="btn btn-save" onclick="salvarKey()">Salvar Chave</button>
        </div>
    </div>

    <div class="card">
        <div class="grid-filters">
            <div class="form-group">
                <label for="select-conteudo"><i class="fa-solid fa-book"></i> Conteúdo</label>
                <select id="select-conteudo">
                    <option value="Funções Afins" selected>Funções Afins</option>
                    <option value="Equações do 2º Grau">Equações do 2º Grau</option>
                    <option value="Teorema de Pitágoras">Teorema de Pitágoras</option>
                    <option value="Porcentagem">Porcentagem</option>
                    <option value="Análise Combinatória">Análise Combinatória</option>
                    <option value="Trigonometria Básica">Trigonometria Básica</option>
                </select>
            </div>

            <div class="form-group">
                <label for="select-nivel"><i class="fa-solid fa-signal"></i> Nível de Dificuldade</label>
                <select id="select-nivel">
                    <option value="fácil">Fácil</option>
                    <option value="médio" selected>Médio</option>
                    <option value="difícil">Difícil</option>
                </select>
            </div>
        </div>

        <button class="btn" onclick="gerarQuestao()"><i class="fa-solid fa-gears"></i> Gerar Questão com IA</button>
    </div>

    <div id="box-questao" class="card question-box">
        <div class="question-header">
            <span id="badge-conteudo" class="badge">Conteúdo</span>
            <span id="badge-nivel" class="badge">Nível</span>
        </div>
        
        <div id="questao-texto" class="question-text"></div>
        <div id="alternativas-container" class="options-list"></div>
        <div id="feedback-box" class="feedback"></div>

        <div class="action-buttons">
            <button id="btn-verificar" class="btn" onclick="verificarResposta()">
                <i class="fa-solid fa-circle-check"></i> Verificar Resposta
            </button>
            <button id="btn-proxima" class="btn btn-next" onclick="gerarQuestao()">
                <i class="fa-solid fa-arrow-right"></i> Próxima
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
